# Redis持久化配置文件
# 用于Docker环境

# RDB持久化配置
# 在指定时间内，如果执行了指定数量的写操作，则保存数据到磁盘
save 900 1    # 900秒（15分钟）内至少有1个key发生变化
save 300 10   # 300秒（5分钟）内至少有10个key发生变化
save 60 10000 # 60秒（1分钟）内至少有10000个key发生变化

# RDB文件名
dbfilename dump.rdb

# RDB文件保存目录
dir /data

# 是否压缩RDB文件
rdbcompression yes

# 是否对RDB文件进行校验
rdbchecksum yes

# AOF持久化配置
# 开启AOF持久化
appendonly yes

# AOF文件名
appendfilename "appendonly.aof"

# AOF同步策略
# always: 每次写操作都同步到磁盘（最安全，但性能最差）
# everysec: 每秒同步一次（推荐，平衡了性能和数据安全）
# no: 由操作系统决定何时同步（性能最好，但数据安全性最差）
appendfsync everysec

# AOF重写配置
# 当AOF文件大小比上一次重写后的文件大小增长100%时，进行重写
auto-aof-rewrite-percentage 100
# AOF文件最小重写大小为64MB
auto-aof-rewrite-min-size 64mb

# 是否在AOF重写期间进行同步
no-appendfsync-on-rewrite no

# 是否加载损坏的AOF文件
aof-load-truncated yes

# 混合持久化配置（Redis 4.0+）
# 开启混合持久化，结合RDB和AOF的优点
aof-use-rdb-preamble yes

# 日志级别
loglevel notice

# 日志文件
logfile ""

# 最大内存配置
# maxmemory 256mb

# 内存淘汰策略
# volatile-lru: 从设置了过期时间的key中淘汰最近最少使用的key
# allkeys-lru: 从所有key中淘汰最近最少使用的key
# volatile-lfu: 从设置了过期时间的key中淘汰最不经常使用的key
# allkeys-lfu: 从所有key中淘汰最不经常使用的key
# volatile-random: 从设置了过期时间的key中随机淘汰
# allkeys-random: 从所有key中随机淘汰
# volatile-ttl: 从设置了过期时间的key中淘汰即将过期的key
# noeviction: 不淘汰任何key，当内存满时返回错误
maxmemory-policy volatile-random

# 网络配置
bind 0.0.0.0

# 持久化文件权限
protected-mode no
