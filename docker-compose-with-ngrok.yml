services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - mongodb
      - redis
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=travel_agent_user
      - MYSQL_PASSWORD=Tr@velA1g3nt#2025!Secure
      - MYSQL_DATABASE=travel_agent
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USER=travel_agent_mongo
      - MONGODB_PASSWORD=M0ng0#Tr@vel2025!Secure
      - MONGODB_DATABASE=travel_agent
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=R3d1s#Tr@vel2025!Secure
      - REDIS_DB=1
      - JWT_SECRET_KEY=UoFj5OGotDPJFlQLFTHQDZtB7QDtR3lG01Xk+iDVnY4=
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - AMAP_MAPS_API_KEY=${AMAP_MAPS_API_KEY}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - UNSPLASH_SECRET_KEY=${UNSPLASH_SECRET_KEY}
    restart: always

  # MySQL数据库
  mysql:
    image: mysql:8.0
    ports:
       - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Tr@velR00t#2025!Secure
      - MYSQL_DATABASE=travel_agent
      - MYSQL_USER=travel_agent_user
      - MYSQL_PASSWORD=Tr@velA1g3nt#2025!Secure
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/scripts/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # MongoDB数据库
  mongodb:
    image: mongo:7.0
    ports:
       - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=travel_agent_user
      - MONGO_INITDB_ROOT_PASSWORD=M0ng0#Tr@vel2025!Secure
      - MONGO_INITDB_DATABASE=travel_agent
    volumes:
      - mongo-data:/data/db
      - ./backend/scripts/init_mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    restart: always

  # Redis缓存
  redis:
    image: redis/redis-stack-server:latest
    ports:
       - "6379:6379"
    command: redis-stack-server --requirepass R3d1s#Tr@vel2025!Secure --appendonly yes
    volumes:
      - redis-data:/data
    restart: always

  # Ngrok内网穿透服务
  ngrok:
    image: ngrok/ngrok:latest
    command: start --all --config /etc/ngrok/ngrok.yml
    ports:
      - "4040:4040"  # Ngrok Web UI
    volumes:
      - ./backend/scripts/ngrok.yml:/etc/ngrok/ngrok.yml:ro
      - ./backend/scripts/.ngrok2:/home/ngrok/.ngrok2:ro  # 挂载认证文件
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - backend
      - frontend
    restart: always
    network_mode: host  # 使用host网络模式，可以访问宿主机网络

volumes:
  mysql-data:
  mongo-data:
  redis-data:
